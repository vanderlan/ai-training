<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analyzer Agent - Module 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            border: 1px solid #e0e0e0;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }

        header h1 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.7em;
        }

        header p {
            color: #777;
            font-size: 0.95em;
        }

        .status-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        h2 {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
        }

        textarea, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
            background: #fafafa;
            color: #333;
        }

        textarea {
            font-family: 'Courier New', monospace;
            font-size: 0.88em;
            min-height: 260px;
            resize: vertical;
            width: 100%;
        }

        textarea::placeholder {
            color: #999;
        }

        textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            background: #fafafa;
        }

        .controls-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary {
            background: #667eea;
            color: #fff;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary.btn-security {
            background: #c62828;
        }

        .btn-primary.btn-security:hover {
            background: #b71c1c;
            box-shadow: 0 4px 12px rgba(198, 40, 40, 0.35);
        }

        .btn-primary.btn-performance {
            background: #01579b;
        }

        .btn-primary.btn-performance:hover {
            background: #013f6e;
            box-shadow: 0 4px 12px rgba(1, 87, 155, 0.35);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #555;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .help-text {
            color: #777;
            font-size: 0.88em;
            margin-top: 8px;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 500;
            background: #e8eaf6;
            color: #5c6bc0;
        }

        .badge.mode-general  { background: #e8eaf6; color: #5c6bc0; }
        .badge.mode-security { background: #fce4ec; color: #c62828; }
        .badge.mode-performance { background: #e1f5fe; color: #01579b; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 24px;
            color: #667eea;
            font-weight: 500;
        }

        .hidden { display: none; }

        /* Status messages */
        .status-message {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .status-message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #81c784; }
        .status-message.error   { background: #ffebee; color: #c62828; border: 1px solid #e57373; }
        .status-message.info    { background: #e3f2fd; color: #1565c0; border: 1px solid #64b5f6; }

        /* Result cards */
        .result-container {
            margin-top: 20px;
        }

        .answer-box {
            background: #f9f9fb;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .answer-box h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1.05em;
        }

        /* Issues */
        .issues-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .issue-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 14px;
            border-left: 4px solid;
        }

        .issue-item.critical { border-left-color: #c62828; }
        .issue-item.high     { border-left-color: #e65100; }
        .issue-item.medium   { border-left-color: #f9a825; }
        .issue-item.low      { border-left-color: #2e7d32; }

        .issue-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .severity-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .severity-badge.critical { background: #ffebee; color: #c62828; }
        .severity-badge.high     { background: #fff3e0; color: #e65100; }
        .severity-badge.medium   { background: #fffde7; color: #f9a825; }
        .severity-badge.low      { background: #e8f5e9; color: #2e7d32; }

        .category-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 500;
            background: #e8eaf6;
            color: #5c6bc0;
        }

        .line-ref {
            font-size: 0.82em;
            color: #999;
            margin-left: auto;
        }

        .issue-detail {
            font-size: 0.9em;
            color: #444;
            line-height: 1.55;
        }

        .issue-fix {
            font-size: 0.88em;
            color: #555;
            margin-top: 8px;
            padding: 8px 12px;
            background: #f0f4ff;
            border-radius: 4px;
            line-height: 1.5;
        }

        /* Suggestions */
        .suggestions-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .suggestions-list li {
            padding: 8px 12px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            font-size: 0.9em;
            color: #444;
            line-height: 1.5;
        }

        .suggestions-list li::before {
            content: '→ ';
            color: #667eea;
            font-weight: 700;
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-top: 14px;
        }

        .metric-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 18px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.4em;
            font-weight: 700;
            color: #667eea;
            text-transform: capitalize;
        }

        .metric-label {
            color: #777;
            font-size: 0.8em;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Code Analyzer Agent - Module 2</h1>
            <p>AI-powered code analysis using RCFG + Chain-of-Thought prompting</p>
            <div class="status-bar">
                <span id="mode-badge" class="badge mode-general">Mode: General</span>
                <span id="status-badge" class="badge">Ready</span>
            </div>
        </header>

        <section>
            <h2>Your Code</h2>
            <textarea id="code" placeholder="Paste your code here to analyze..."></textarea>

            <div class="controls-row">
                <div>
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="java">Java</option>
                        <option value="csharp">C#</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="analyzeCode('general')">📊 General Analysis</button>
                    <button class="btn-primary btn-security" onclick="analyzeCode('security')">🔒 Security Analysis</button>
                    <button class="btn-primary btn-performance" onclick="analyzeCode('performance')">⚡ Performance Analysis</button>
                    <button class="btn-secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>
            <p class="help-text">Choose an analysis mode. The AI will return structured findings with severity, category, and fix suggestions.</p>
        </section>

        <div id="loading" class="loading hidden">Analyzing your code...</div>
        <div id="status-msg" class="hidden"></div>
        <div id="result-container" class="result-container"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Pre-fill with sample code
        document.getElementById('code').value = `def process_data(data):
    result = []
    for i in range(len(data)):
        if data[i] > 0:
            result.append(data[i] * 2)
    return result

def get_user(user_id):
    import sqlite3
    conn = sqlite3.connect('users.db')
    cursor = conn.cursor()
    query = f"SELECT * FROM users WHERE id = {user_id}"
    cursor.execute(query)
    return cursor.fetchone()`;

        async function analyzeCode(type) {
            const code = document.getElementById('code').value.trim();
            const language = document.getElementById('language').value;

            if (!code) {
                showStatus('Please paste some code to analyze.', 'error');
                return;
            }

            const modeLabel   = { general: 'Mode: General', security: 'Mode: Security', performance: 'Mode: Performance' };
            const modeClass   = { general: 'mode-general',  security: 'mode-security',  performance: 'mode-performance' };
            const modeBadge   = document.getElementById('mode-badge');
            modeBadge.textContent = modeLabel[type];
            modeBadge.className   = `badge ${modeClass[type]}`;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-container').innerHTML = '';
            document.getElementById('status-msg').classList.add('hidden');
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('status-badge').textContent = 'Analyzing…';

            try {
                const endpoint = type === 'general' ? '/api/analyze' : `/api/analyze/${type}`;
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || data.message || 'Analysis failed');
                }

                displayResults(data.analysis, type);
                document.getElementById('status-badge').textContent = 'Done';
            } catch (error) {
                showStatus(`Error: ${escapeHtml(error.message)}`, 'error');
                document.getElementById('status-badge').textContent = 'Error';
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.querySelectorAll('button').forEach(b => b.disabled = false);
            }
        }

        function displayResults(analysis, type) {
            let html = '';

            // Summary
            html += `
                <div class="answer-box">
                    <h3>📋 Summary</h3>
                    <p style="color:#444; line-height:1.7;">${escapeHtml(analysis.summary)}</p>
                </div>`;

            // Issues
            if (analysis.issues && analysis.issues.length > 0) {
                html += `
                <div class="answer-box" style="border-left-color:#e57373;">
                    <h3 style="color:#c62828;">🐛 Issues Found (${analysis.issues.length})</h3>
                    <div class="issues-grid">
                        ${analysis.issues.map(issue => `
                            <div class="issue-item ${issue.severity}">
                                <div class="issue-header">
                                    <span class="severity-badge ${issue.severity}">${issue.severity}</span>
                                    <span class="category-badge">${issue.category}</span>
                                    ${issue.line ? `<span class="line-ref">Line ${issue.line}</span>` : ''}
                                </div>
                                <div class="issue-detail">${escapeHtml(issue.description)}</div>
                                <div class="issue-fix">💡 ${escapeHtml(issue.suggestion)}</div>
                            </div>`).join('')}
                    </div>
                </div>`;
            } else {
                html += `<div class="status-message success" style="margin-bottom:16px;">✅ No issues found!</div>`;
            }

            // Suggestions
            if (analysis.suggestions && analysis.suggestions.length > 0) {
                html += `
                <div class="answer-box" style="border-left-color:#7986cb;">
                    <h3 style="color:#5c6bc0;">💡 Suggestions (${analysis.suggestions.length})</h3>
                    <ul class="suggestions-list">
                        ${analysis.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                    </ul>
                </div>`;
            }

            // Metrics
            if (analysis.metrics) {
                html += `
                <div class="answer-box" style="border-left-color:#4db6ac;">
                    <h3 style="color:#00796b;">📊 Quality Metrics</h3>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-value">${escapeHtml(analysis.metrics.complexity)}</div>
                            <div class="metric-label">Complexity</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${escapeHtml(analysis.metrics.readability)}</div>
                            <div class="metric-label">Readability</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${escapeHtml(analysis.metrics.test_coverage_estimate)}</div>
                            <div class="metric-label">Test Coverage</div>
                        </div>
                    </div>
                </div>`;
            }

            document.getElementById('result-container').innerHTML = html;
        }

        function showStatus(message, type) {
            const el = document.getElementById('status-msg');
            el.textContent = message;
            el.className = `status-message ${type}`;
        }

        function clearAll() {
            document.getElementById('code').value = '';
            document.getElementById('result-container').innerHTML = '';
            document.getElementById('status-msg').className = 'hidden';
            document.getElementById('status-badge').textContent = 'Ready';
            const badge = document.getElementById('mode-badge');
            badge.textContent = 'Mode: General';
            badge.className = 'badge mode-general';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
